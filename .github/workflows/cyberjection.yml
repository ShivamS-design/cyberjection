# Reusable CI/CD security evaluation gate (Phase 6, Task 6.4).
#
# The Phase 6 design spec's own workflow sketch installs dependencies via
# `pip install poetry && poetry install` and invokes `poetry run cyberjection
# ...`. This project has never used Poetry -- `pyproject.toml` has declared
# a `hatchling` build backend with a plain `pip install -e ".[dev]"` install
# flow since Phase 1, and there is no `poetry.lock` anywhere in the repo.
# Adopting Poetry here would mean introducing a second, parallel dependency
# manager for one workflow file. This workflow installs and invokes the
# project the same way every other phase's documented Quickstart does.
name: Cyberjection AI Security Evaluation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  security-eval:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit test suite
        run: pytest tests/unit/ -v

      - name: Run Cyberjection security evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cyberjection run \
            --config examples/quickstart.yaml \
            --target support-agent \
            --threshold 7.0 \
            --sarif-out results.sarif \
            --json-out results.json

      - name: Upload SARIF report to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif

      - name: Upload JSON/SARIF artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cyberjection-reports
          path: |
            results.sarif
            results.json

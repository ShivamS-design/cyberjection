[alembic]
script_location = alembic
prepend_sys_path = .

# Overridden at runtime by alembic/env.py, which reads CYBERJECTION_DB_URL
# (falling back to cyberjection.persistence.sqlite.DEFAULT_DB_URL) so the
# same database URL logic used by the application is used for migrations
# instead of being duplicated here.
sqlalchemy.url = sqlite+aiosqlite:///.cyberjection/results.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
